<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
</head>
<body>
    <div class="row" style="border: 1px solid black;">
        <div class="left">
            <div class="photo">
                <div class="photo-center">
                    <p><img src="img/photo.jpeg" alt="Photo" height = "200px"></p>
                </div>
            </div>
            <div class="contact styles-left">
                <h3>Contact</h3>
            </div>
            <div class="education styles-left">
                <h3>Education</h3>
            </div>
            <div class="language styles-left">
                <h3>Language</h3>
            </div>
        </div>
        <div class="right">
            <div class="name">
                <h1>David <br>Anderson</h1>
                <h3>UX Designer</h3>
            </div>
            <div class="profile">Profile</div>
            <div class="experience">
                <h3>experience</h3>
                <div class="experience-wrap">
                    <div class="experience-left">experience-left</div>
                </div>
                <div class="experience-wrap">
                    <div class="experience-right">experience-right</div>
                </div>  
            </div>
            <div class="skills">Skills</div>
        </div>
    </div>
</body>
</html>
